# Taskfile.yml
version: '3'

vars:
  PROTO_DIR: proto
  PROTO_GEN_DIR: internal/generated
  PROTOC_GEN_GO_VERSION: v1.36.11
  PROTOC_GEN_GO_GRPC_VERSION: v1.6.1
  GOLANGCI_LINT_VERSION: v2.11.4
  GOMOCK_VERSION: v0.7.1
  SQL_MIGRATE_VERSION: v1.8.1

tasks:
  install-tools:
    desc: Install tools locally into ./bin
    cmds:
      - mkdir -p bin
      - GOBIN={{.ROOT_DIR}}/bin go install google.golang.org/protobuf/cmd/protoc-gen-go@{{.PROTOC_GEN_GO_VERSION}}
      - GOBIN={{.ROOT_DIR}}/bin go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@{{.PROTOC_GEN_GO_GRPC_VERSION}}
      - GOBIN={{.ROOT_DIR}}/bin go install -v github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
      - GOBIN={{.ROOT_DIR}}/bin go install -v github.com/matryer/moq@{{.GOMOCK_VERSION}}
      - GOBIN={{.ROOT_DIR}}/bin go install github.com/rubenv/sql-migrate/...@{{.SQL_MIGRATE_VERSION}}
    status:
      - test -f ./bin/protoc-gen-go
      - test -f ./bin/protoc-gen-go-grpc
      - test -f ./bin/golangci-lint
      - test -f ./bin/sql-migrate

  fmt:
    desc: format code
    cmds:
      - gofmt -w -l .
  lint:
    desc: lint with fix some code issues
    deps: [ install-tools ]
    cmds:
      - "{{.ROOT_DIR}}/bin/golangci-lint run --timeout 5m --fix --concurrency 4 ./..."
  pretty:
    desc: prettify code
    deps: [ fmt, lint ]

  proto-generate:
    desc: Generate Go code from .proto files
    deps: [ install-tools ]
    cmds:
      - mkdir -p {{.PROTO_GEN_DIR}}
      - >
        protoc
        --plugin=protoc-gen-go=./bin/protoc-gen-go
        --plugin=protoc-gen-go-grpc=./bin/protoc-gen-go-grpc
        --go_out={{.PROTO_GEN_DIR}} --go_opt=paths=source_relative
        --go-grpc_out={{.PROTO_GEN_DIR}} --go-grpc_opt=paths=source_relative
        -I {{.PROTO_DIR}}
        {{.PROTO_DIR}}/*.proto

  remove-mocks:
    desc: remove mocks
    cmds:
      - cmd: find ./internal -type f -name '*.go' -exec grep -il '^// Code generated by moq; DO NOT EDIT.' {} \; -delete
        ignore_error: true
        silent: true

#  remove-wrappers:
#    desc: remove wrappers
#    cmds:
#      - cmd: find ./internal -type f -name '*.go' -exec grep -il '^// Code generated by gowrap. DO NOT EDIT.' {} \; -delete
#        ignore_error: true
#        silent: true

  gen-mocks:
    desc: generate mocks
    cmds:
      - task: remove-mocks
      - PATH={{.ROOT_DIR}}/bin:$PATH go generate -run="moq" ./...

#  gen-wraps:
#    desc: generate metrics and logger wrappers for store entities
#    cmds:
#      - task: remove-wrappers
#      - PATH={{.ROOT_DIR}}/bin:$PATH go generate -run="gowrap" ./...

  gen:
    desc: generate all
    deps: [ install-tools ]
    cmds:
      - task: gen-mocks
#      - task: gen-wraps
      - task: proto-generate

  infra-up:
    desc: Start infrastructure and apply migrations
    cmds:
      - docker compose -f deployments/docker-compose.yml up -d
      - echo "Waiting for Postgres to be ready..."
      - >
        until docker compose -f deployments/docker-compose.yml
        exec -T postgres pg_isready -U orders_user -d orders; do
          sleep 1;
        done
      - task: migrations-up
      - task: gen

  infra-down:
    desc: Stop infrastructure
    cmds:
      - docker compose -f deployments/docker-compose.yml down

  migrations-up:
    desc: Apply migrations
    deps: [ install-tools ]
    cmds:
      - "{{.ROOT_DIR}}/bin/sql-migrate up -config=config/dbconfig.yml -env=development"

  migrations-down:
    desc: Undo last migration
    deps: [ install-tools ]
    cmds:
      - "{{.ROOT_DIR}}/bin/sql-migrate down -config=config/dbconfig.yml -env=development"

  migrations-new:
    desc: Create a new migration
    deps: [ install-tools ]
    cmds:
      - "{{.ROOT_DIR}}/bin/sql-migrate new -config=config/dbconfig.yml -env=development {{.CLI_ARGS}}"

  run:
    desc: Run the gRPC server
    cmds:
      - go run ./cmd/app

  run-all:
    desc: Run the gRPC server and the infra
    cmds:
      - task: infra-up
      - go run ./cmd/app

  test:
    desc: Run all tests
    cmds:
      - go test ./...