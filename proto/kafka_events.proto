syntax = "proto3";

package order.v1;

import "types.proto";
import "google/type/decimal.proto";
import "google/type/money.proto";
import "order.proto";

option go_package = "github.com/cathudson/order-service/internal/proto";

message CreateOrderEvent {
  UUID id = 1;
  UUID account_id = 2;
  UUID idempotency_key = 3;
  UUID instrument_id = 4;
  OrderBy order_by = 5;
  optional google.type.Decimal quantity = 6;
  optional google.type.Money amount = 7;
  OrderSide side = 8;
}
