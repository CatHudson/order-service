syntax = "proto3";

package order.v1;

import "types.proto";
import "google/type/decimal.proto";
import "google/type/money.proto";
import "order.proto";

option go_package = "github.com/cathudson/order-service/internal/proto";

message CreateOrderEvent {
  UUID id = 1;
  UUID account_id = 2;
  UUID instrument_id = 3;
  OrderBy order_by = 4;
  optional google.type.Decimal quantity = 5;
  optional google.type.Money amount = 6;
  OrderSide side = 7;
}

message OrderResultEvent {
  UUID id = 1;
  OrderSide side = 2;
  OrderBy order_by = 3;
  OrderStatus status = 4;
  optional google.type.Money price = 5;
  optional google.type.Money amount = 6;
  optional google.type.Decimal quantity = 7;
  optional string error_message = 8;
}
