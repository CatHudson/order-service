syntax = "proto3";

package order.v1;

import "types.proto";

option go_package = "github.com/cathudson/order-service/internal/generated";

message Order {
  UUID id = 1;
  UUID account_id = 2;
  UUID idempotency_key = 3;
  UUID instrument_id = 4;
  uint64 amount = 5;
  OrderSide side = 6;
  OrderStatus status = 7;
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_NEW = 1;
  ORDER_STATUS_PENDING = 2;
  ORDER_STATUS_SUCCESSFUL = 3;
  ORDER_STATUS_FAILED = 4;
}

enum OrderSide {
  ORDER_SIDE_UNSPECIFIED = 0;
  ORDER_SIDE_BUY= 1;
  ORDER_SIDE_SELL = 2;
}
